<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nightfield LLC</title>
  <meta name="description" content="Nightfield LLC designs calm, reliable operational systems with an emphasis on clarity, boundaries, and modular structure." />
  <link rel="icon" href="favicon.ico" />
  <style>
    :root {
      --bgA:#0b0f14;
      --bgB:#141b24;
      --ink:#e8edf6;
      --ink2:rgba(232,237,246,0.72);
      --ink3:rgba(232,237,246,0.55);
      --teal:#48d0d2;
      --tealSoft:rgba(72,208,210,0.14);
      --border:rgba(255,255,255,0.08);
      --panel1:rgba(12,16,22,0.86);
      --panel2:rgba(10,13,18,0.86);
      --radius:18px;
      --max:1040px;
      --shadowOut:0 20px 60px rgba(0,0,0,0.55);
      --shadowIn:inset 0 1px 0 rgba(255,255,255,0.08),
                  inset 0 -1px 0 rgba(0,0,0,0.45),
                  inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; }

    body {
      color:var(--ink);
      font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:
        radial-gradient(1200px 700px at 20% 15%, rgba(30,46,68,0.55), transparent 55%),
        radial-gradient(900px 520px at 80% 55%, rgba(18,26,38,0.70), transparent 55%),
        linear-gradient(145deg,var(--bgA),var(--bgB));
      overflow-x:hidden;
    }

    .wrap { width:min(var(--max),92vw); margin:0 auto; }
    a { color:inherit; text-decoration:none; }
    a:hover { text-decoration:underline; }

    header {
      position:sticky;
      top:0;
      z-index:10;
      background:linear-gradient(180deg, rgba(10,13,18,0.88), rgba(10,13,18,0.55));
      border-bottom:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(10px);
    }

    .nav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:14px 0;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      letter-spacing:0.14em;
      text-transform:uppercase;
      font-weight:650;
      font-size:0.95rem;
      color:rgba(232,237,246,0.88);
    }

    .brand img { height:34px; width:34px; border-radius:12px; }

    nav a {
      color:var(--ink3);
      font-weight:650;
      letter-spacing:0.08em;
      text-transform:uppercase;
      font-size:0.80rem;
      padding:10px 12px;
      border-radius:14px;
    }

    nav a:hover {
      color:rgba(232,237,246,0.90);
      background:rgba(255,255,255,0.04);
      box-shadow:var(--shadowIn);
      border:1px solid rgba(255,255,255,0.06);
      text-decoration:none;
    }

    .panel {
      border-radius:var(--radius);
      background:linear-gradient(145deg,var(--panel1),var(--panel2));
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 1px rgba(72,208,210,0.10),
        0 0 0 4px rgba(72,208,210,0.05),
        var(--shadowOut),
        var(--shadowIn);
      overflow:hidden;
    }

    .hero { padding:64px 0 24px; }
    .hero-box { padding:34px 30px; position:relative; }
    .hero-box:after {
      content:"";
      position:absolute;
      inset:auto auto -140px -140px;
      width:380px; height:380px;
      background:radial-gradient(circle at 55% 45%, rgba(72,208,210,0.20), transparent 60%);
      pointer-events:none; opacity:0.85;
    }

    h1 {
      margin:0 0 12px;
      font-size:clamp(28px,3.2vw,44px);
      line-height:1.12;
      letter-spacing:-0.02em;
      font-weight:700;
      color:rgba(232,237,246,0.92);
      text-shadow:0 1px 0 rgba(0,0,0,0.35);
    }

    h2 {
      margin:0 0 12px;
      font-size:clamp(24px,2.6vw,34px);
      line-height:1.15;
      letter-spacing:-0.02em;
      color:rgba(232,237,246,0.92);
    }

    h3 { margin:0 0 8px; font-size:1.02rem; color:rgba(232,237,246,0.90); }

    p { margin:0 0 14px; color:var(--ink2); }

    section { padding:26px 0; }

    .section-title {
      margin:0 0 12px;
      font-size:0.82rem;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:rgba(232,237,246,0.62);
    }

    .pill {
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid rgba(72,208,210,0.18);
      background:rgba(72,208,210,0.06);
      box-shadow:var(--shadowIn);
      color:rgba(232,237,246,0.86);
      font-weight:750;
      letter-spacing:0.10em;
      text-transform:uppercase;
      font-size:0.72rem;
    }

    .dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--teal);
      box-shadow:0 0 0 5px rgba(72,208,210,0.10);
    }

    footer {
      padding:28px 0 42px;
      color:rgba(232,237,246,0.52);
      font-size:0.92rem;
    }

    .footer-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      border-top:1px solid rgba(255,255,255,0.08);
      padding-top:16px;
    }

    @media (max-width:900px) {
      nav { display:none; }
    }
  </style>
</head>

          <div>Nightfield LLC</div>
        </div>
        <nav aria-label="Site">
          <a href="services.html">Services</a>
          <a href="about.html">About</a>
          <a href="legal.html">Legal</a>
        </nav>
      </div>
    </div>
  </header>
